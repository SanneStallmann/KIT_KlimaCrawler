run:
  run_id: "auto"
  description: "Bavaria municipal crawl"
  code_version: "git-hash"

limits:
  max_depth: 10
  max_pages_per_muni: 20000
  max_pages_per_domain: 2000
  max_pages_per_external_domain: 200
  max_file_size_mb: 50
  max_runtime_minutes_per_muni: 180
  max_retries: 3

fetching:
  user_agent: "KIT-ClimatePolicyCrawler/1.0 (research)"
  respect_robots_txt: true
  global_concurrency: 100
  per_domain_concurrency: 4
  min_delay_seconds_per_domain: 0.2
  request_timeout_seconds: 20
  retry_backoff_seconds: [2, 5, 15]
  max_redirects: 10
  accept_language: "de-DE,de;q=0.9,en;q=0.7"

content:
  allow_html: true
  allow_pdf: true
  allow_docx: true
  allow_xlsx: true
  allow_odt: true
  block_extensions:
    - jpg
    - jpeg
    - png
    - gif
    - webp
    - mp4
    - mp3
    - zip
    - rar
    - 7z
    - exe
    - svg
    - ico
    - css
    - js
    - woff
    - woff2
    - ttf
    - eot

canonicalization:
  strip_fragment: true
  normalize_trailing_slash: true
  drop_query_prefixes:
    - "utm_"
    - "pk_"
  drop_query_keys:
    - "fbclid"
    - "gclid"
    - "session"
    - "jsessionid"
    - "sid"
    - "phpsessid"
    - "msclkid"

traps:
  block_path_patterns:
    - "/suche"
    - "/search"
    - "/tag/"
    - "/calendar"
    - "/veranstaltungen"
    - "/events"
  pagination_tokens:
    - "page="
    - "/page/"
    - "offset="
    - "start="
    - "p="
    - "seite="
    - "paged="
  max_pagination_depth: 20

seeding:
  use_homepage: true
  parse_robots_for_sitemaps: true
  use_sitemap_xml: true
  parse_nav_links_depth: 2
  allow_subdomains: true
  seed_additional_paths:
    - "/klima"
    - "/klimaschutz"
    - "/energie"
    - "/umwelt"
    - "/mobilitaet"
    - "/verkehr"
    - "/bauen"
    - "/foerderung"
    - "/satzungen"
    - "/bekanntmachungen"

frontier:
  mode: "priority"
  min_priority_to_enqueue: -999999
  high_priority_threshold: 4

keywords:
  positive:
    - "klima"
    - "klimaschutz"
    - "energie"
    - "co2"
    - "emission"
    - "wärme"
    - "waerme"
    - "sanierung"
    - "solar"
    - "photovoltaik"
    - "pv"
    - "wind"
    - "förder"
    - "foerder"
    - "richtlinie"
    - "satzung"
    - "ladesäule"
    - "ladesaeule"
    - "ladeinfrastruktur"
    - "elektromobil"
    - "nachhalt"
    - "mobil"
    - "verkehr"
    - "rad"
    - "radverkehr"
    - "gebäude"
    - "gebaeude"
    - "bauen"
    - "strom"
    - "wärmenetz"
    - "waermenetz"
    - "wärmepumpe"
    - "waermepumpe"
  negative:
    - "impressum"
    - "datenschutz"
    - "cookie"
    - "login"
    - "karriere"
    - "stellen"
    - "presse"
    - "shop"
    - "webmail"
    - "newsletter"

storage:
  state_db: "crawler/data/db/crawl.sqlite"
  municipalities_db: "crawler/data/db/municipalities.sqlite"
  raw_root: "crawler/data/raw"
  store_raw_html: true
  store_raw_pdf: true
  store_raw_docx: true
  hash_raw_sha256: true
  store_headers: true
  compress_raw: true

logging:
  level: "INFO"
  log_dir: "crawler/logs"
  log_sqlite_errors: true
  log_failed_urls: true
